name: Build

# Builds the app for Android and/or iOS and uploads the binary as a workflow
# artifact you can download from the run summary. Manual trigger only — pick
# which platforms to build.

on:
  workflow_dispatch:
    inputs:
      platforms:
        type: choice
        description: 'Which platforms to build?'
        required: true
        default: 'android'
        options:
          - android
          - ios
          - both
      build_mode:
        type: choice
        description: 'Flutter build mode'
        required: true
        default: 'release'
        options:
          - release
          - profile
          - debug
      release:
        type: choice
        description: 'Publish a GitHub Release? (independent of build_mode above)'
        required: true
        default: 'none'
        options:
          - none
          - release-debug
          - release-prod

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter_version: 3.32.6

jobs:
  setup:
    name: Configure Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
      build_android: ${{ steps.platform.outputs.build_android }}
      build_ios: ${{ steps.platform.outputs.build_ios }}
      do_release: ${{ steps.release.outputs.do_release }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}
      release_kind: ${{ steps.release.outputs.release_kind }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine platforms to build
        id: platform
        env:
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          if [[ "$PLATFORMS" == "android" ]] || [[ "$PLATFORMS" == "both" ]]; then
            echo "build_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_android=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$PLATFORMS" == "ios" ]] || [[ "$PLATFORMS" == "both" ]]; then
            echo "build_ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_ios=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get build version
        id: version
        run: |
          CURRENT_VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "build_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      # Resolve the release input into concrete tag/name/flags so downstream
      # jobs don't have to re-parse it. Prod tags are strict (vX.Y.Z) so a
      # re-run with the same pubspec version will fail — by design. Debug
      # tags carry the run number, so iterating on bug-test builds is cheap.
      - name: Resolve release metadata
        id: release
        env:
          RELEASE_CHOICE: ${{ github.event.inputs.release }}
          RAW_VERSION: ${{ steps.version.outputs.build_version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # pubspec version looks like "1.0.0+3"; strip the "+build" suffix
          # because git tags can't carry a "+" through most tooling.
          SEMVER="${RAW_VERSION%%+*}"

          case "$RELEASE_CHOICE" in
            release-prod)
              echo "do_release=true" >> "$GITHUB_OUTPUT"
              echo "release_kind=prod" >> "$GITHUB_OUTPUT"
              echo "release_tag=v${SEMVER}" >> "$GITHUB_OUTPUT"
              echo "release_name=v${SEMVER}" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
            release-debug)
              echo "do_release=true" >> "$GITHUB_OUTPUT"
              echo "release_kind=debug" >> "$GITHUB_OUTPUT"
              echo "release_tag=v${SEMVER}-debug.${RUN_NUMBER}" >> "$GITHUB_OUTPUT"
              echo "release_name=v${SEMVER} (debug #${RUN_NUMBER})" >> "$GITHUB_OUTPUT"
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "do_release=false" >> "$GITHUB_OUTPUT"
              echo "release_kind=" >> "$GITHUB_OUTPUT"
              echo "release_tag=" >> "$GITHUB_OUTPUT"
              echo "release_name=" >> "$GITHUB_OUTPUT"
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: setup
    if: needs.setup.outputs.build_android == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK 27.0.12077973
        run: |
          echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.flutter_version }}
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      # Decode the release keystore from secrets and write key.properties so
      # build.gradle.kts picks it up. Only runs when the secret is set —
      # forks / first-time clones without secrets fall back to debug signing
      # (build still works, just not Play-Store-uploadable).
      - name: Configure Android release signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/atelier-release.jks
          # storeFile is resolved by Gradle relative to android/app/, so the
          # path here is just the filename — no app/ prefix.
          {
            printf 'storeFile=atelier-release.jks\n'
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      - name: Build Android APK (${{ github.event.inputs.build_mode }}, arm64)
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: flutter build apk "--${BUILD_MODE}" --target-platform=android-arm64

      - name: Rename APK
        env:
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          cp "build/app/outputs/flutter-apk/app-${BUILD_MODE}.apk" \
             "atelier-android-${BUILD_VERSION}-${BUILD_MODE}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: atelier-android-${{ needs.setup.outputs.build_version }}-${{ github.event.inputs.build_mode }}
          path: atelier-android-${{ needs.setup.outputs.build_version }}-${{ github.event.inputs.build_mode }}.apk
          retention-days: 14

  build-ios:
    name: Build iOS app (unsigned)
    runs-on: macos-15
    timeout-minutes: 30
    needs: setup
    if: needs.setup.outputs.build_ios == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.flutter_version }}
          cache: true

      - name: Cache CocoaPods dependencies
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      # iOS artifacts are unsigned, so a --release build can't be installed on
      # a device without re-signing. Auto-downgrade release -> profile.
      - name: Resolve effective build mode
        env:
          REQUESTED_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          if [[ "$REQUESTED_MODE" == "release" ]]; then
            echo "::warning title=iOS release downgraded::Release iOS builds here are unsigned and cannot be installed on devices. Building profile instead."
            echo "EFFECTIVE_MODE=profile" >> "$GITHUB_ENV"
            echo "ARTIFACT_SUFFIX=profile-downgraded-from-release" >> "$GITHUB_ENV"
          else
            echo "EFFECTIVE_MODE=$REQUESTED_MODE" >> "$GITHUB_ENV"
            echo "ARTIFACT_SUFFIX=$REQUESTED_MODE" >> "$GITHUB_ENV"
          fi

      - name: Build iOS app (no codesign)
        run: flutter build ios "--${EFFECTIVE_MODE}" --no-codesign

      - name: Archive Runner.app
        env:
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
        run: |
          cd build/ios/iphoneos
          zip -r "../../../atelier-ios-${BUILD_VERSION}-${ARTIFACT_SUFFIX}.zip" Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: atelier-ios-${{ needs.setup.outputs.build_version }}-${{ env.ARTIFACT_SUFFIX }}
          path: atelier-ios-${{ needs.setup.outputs.build_version }}-${{ env.ARTIFACT_SUFFIX }}.zip
          retention-days: 14

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, build-android, build-ios]
    # Skipped jobs report `result: skipped` (not failure), so this triggers
    # whenever the user picked a release option AND neither platform job
    # actually failed. A skipped iOS build on an Android-only run is fine.
    if: >-
      always() &&
      needs.setup.outputs.do_release == 'true' &&
      needs.build-android.result != 'failure' &&
      needs.build-ios.result != 'failure'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Full history so we can walk back to the previous release tag for
          # the changelog. Default fetch-depth: 1 would leave us blind.
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts for release
        run: ls -la dist/

      # Walk back to the most recent tag of the SAME kind (prod vs debug) so
      # the changelog reflects what changed within that release channel —
      # debug notes don't get polluted with intervening prod releases and
      # vice versa.
      - name: Generate changelog
        id: changelog
        env:
          RELEASE_KIND: ${{ needs.setup.outputs.release_kind }}
          RELEASE_TAG: ${{ needs.setup.outputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ "$RELEASE_KIND" == "prod" ]]; then
            # Prod tags are plain SemVer: v1.0.0 — no pre-release suffix.
            PREV_TAG=$(git tag --list 'v*' --sort=-v:refname \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v "^${RELEASE_TAG}$" \
              | head -n 1 || true)
          else
            # Debug tags: v1.0.0-debug.<run_number>.
            PREV_TAG=$(git tag --list 'v*-debug.*' --sort=-v:refname \
              | grep -v "^${RELEASE_TAG}$" \
              | head -n 1 || true)
          fi

          {
            echo "changelog<<__EOF_CHANGELOG__"
            if [[ -z "$PREV_TAG" ]]; then
              echo "Initial ${RELEASE_KIND} release."
            else
              echo "Changes since \`${PREV_TAG}\`:"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)' --no-merges
            fi
            echo ""
            echo "__EOF_CHANGELOG__"
          } >> "$GITHUB_OUTPUT"

          if [[ -n "$PREV_TAG" ]]; then
            echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose release notes
        id: notes
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
          RELEASE_KIND: ${{ needs.setup.outputs.release_kind }}
          PREV_TAG: ${{ steps.changelog.outputs.prev_tag }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          set -euo pipefail
          {
            echo "body<<__EOF_BODY__"
            echo "**Channel:** ${RELEASE_KIND}"
            echo "**Build mode:** ${BUILD_MODE}"
            echo "**Platforms:** ${PLATFORMS}"
            if [[ -n "${PREV_TAG}" ]]; then
              echo "**Previous tag:** \`${PREV_TAG}\`"
            fi
            echo ""
            echo "## Changelog"
            echo ""
            echo "${CHANGELOG}"
            echo "__EOF_BODY__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.setup.outputs.release_tag }}
          name: ${{ needs.setup.outputs.release_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ needs.setup.outputs.prerelease }}
          # Single brace-expansion glob so platform-specific runs don't
          # trip fail_on_unmatched_files: an Android-only run produces no
          # .zip, an iOS-only run produces no .apk. The safety net still
          # fires if the run produced literally zero artifacts.
          fail_on_unmatched_files: true
          files: dist/**/*.{apk,zip}
