name: Build

# Builds the app for Android and/or iOS and uploads the binary as a workflow
# artifact you can download from the run summary. Manual trigger only — pick
# which platforms to build.

on:
  workflow_dispatch:
    inputs:
      platforms:
        type: choice
        description: 'Which platforms to build?'
        required: true
        default: 'android'
        options:
          - android
          - ios
          - both

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter_version: 3.32.6

jobs:
  setup:
    name: Configure Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
      build_android: ${{ steps.platform.outputs.build_android }}
      build_ios: ${{ steps.platform.outputs.build_ios }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine platforms to build
        id: platform
        env:
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          if [[ "$PLATFORMS" == "android" ]] || [[ "$PLATFORMS" == "both" ]]; then
            echo "build_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_android=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$PLATFORMS" == "ios" ]] || [[ "$PLATFORMS" == "both" ]]; then
            echo "build_ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_ios=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get build version
        id: version
        run: |
          CURRENT_VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "build_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: setup
    if: needs.setup.outputs.build_android == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27.0.12077973
        run: |
          echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          flutter-version: ${{ env.flutter_version }}
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug, unsigned)
        run: flutter build apk --debug

      - name: Rename APK
        env:
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk \
             "atelier-android-${BUILD_VERSION}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: atelier-android-${{ needs.setup.outputs.build_version }}
          path: atelier-android-${{ needs.setup.outputs.build_version }}.apk
          retention-days: 14

  build-ios:
    name: Build iOS app (unsigned)
    runs-on: macos-15
    timeout-minutes: 30
    needs: setup
    if: needs.setup.outputs.build_ios == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          flutter-version: ${{ env.flutter_version }}
          cache: true

      - name: Cache CocoaPods dependencies
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS app (no codesign)
        run: flutter build ios --debug --no-codesign

      - name: Archive Runner.app
        env:
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
        run: |
          cd build/ios/iphoneos
          zip -r "../../../atelier-ios-${BUILD_VERSION}.zip" Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: atelier-ios-${{ needs.setup.outputs.build_version }}
          path: atelier-ios-${{ needs.setup.outputs.build_version }}.zip
          retention-days: 14
