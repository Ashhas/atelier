name: Build

# Builds the app for Android and/or iOS and uploads the binary as a workflow
# artifact you can download from the run summary. Manual trigger only — pick
# which platforms to build.

on:
  workflow_dispatch:
    inputs:
      platforms:
        type: choice
        description: 'Which platforms to build?'
        required: true
        default: 'android'
        options:
          - android
          - ios
          - both
      build_mode:
        type: choice
        description: 'Flutter build mode'
        required: true
        default: 'release'
        options:
          - release
          - profile
          - debug

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  flutter_version: 3.32.6

jobs:
  setup:
    name: Configure Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
      build_android: ${{ steps.platform.outputs.build_android }}
      build_ios: ${{ steps.platform.outputs.build_ios }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine platforms to build
        id: platform
        env:
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          if [[ "$PLATFORMS" == "android" ]] || [[ "$PLATFORMS" == "both" ]]; then
            echo "build_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_android=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$PLATFORMS" == "ios" ]] || [[ "$PLATFORMS" == "both" ]]; then
            echo "build_ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_ios=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get build version
        id: version
        run: |
          CURRENT_VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "build_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: setup
    if: needs.setup.outputs.build_android == 'true'
    outputs:
      artifact_name: atelier-android-${{ needs.setup.outputs.build_version }}-${{ github.event.inputs.build_mode }}
      artifact_url: ${{ steps.upload_android.outputs.artifact-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK 27.0.12077973
        run: |
          echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.flutter_version }}
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (${{ github.event.inputs.build_mode }}, arm64)
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: flutter build apk "--${BUILD_MODE}" --target-platform=android-arm64

      - name: Rename APK
        env:
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          cp "build/app/outputs/flutter-apk/app-${BUILD_MODE}.apk" \
             "atelier-android-${BUILD_VERSION}-${BUILD_MODE}.apk"

      - name: Upload Android artifact
        id: upload_android
        uses: actions/upload-artifact@v5
        with:
          name: atelier-android-${{ needs.setup.outputs.build_version }}-${{ github.event.inputs.build_mode }}
          path: atelier-android-${{ needs.setup.outputs.build_version }}-${{ github.event.inputs.build_mode }}.apk
          retention-days: 14

      # Print to stdout (visible in the GitHub mobile app's log view) AND to
      # $GITHUB_STEP_SUMMARY (visible on the website). Mobile only autolinks
      # plain URLs in logs, so we echo the URL on its own line.
      - name: Announce Android artifact
        env:
          ARTIFACT_NAME: atelier-android-${{ needs.setup.outputs.build_version }}-${{ github.event.inputs.build_mode }}
          ARTIFACT_URL: ${{ steps.upload_android.outputs.artifact-url }}
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          echo "================================================================"
          echo "Android (${BUILD_MODE}) artifact: ${ARTIFACT_NAME}.apk"
          echo "Download:"
          echo "${ARTIFACT_URL}"
          echo "================================================================"
          echo "::notice title=Android artifact ready::${ARTIFACT_NAME} -> ${ARTIFACT_URL}"
          {
            echo "### Android — \`${BUILD_MODE}\`"
            echo ""
            echo "- Artifact: [\`${ARTIFACT_NAME}.apk\`](${ARTIFACT_URL})"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  build-ios:
    name: Build iOS app (unsigned)
    runs-on: macos-15
    timeout-minutes: 30
    needs: setup
    if: needs.setup.outputs.build_ios == 'true'
    outputs:
      artifact_name: ${{ steps.resolve_mode.outputs.artifact_name }}
      artifact_url: ${{ steps.upload_ios.outputs.artifact-url }}
      effective_mode: ${{ steps.resolve_mode.outputs.effective_mode }}
      downgraded: ${{ steps.resolve_mode.outputs.downgraded }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.flutter_version }}
          cache: true

      - name: Cache CocoaPods dependencies
        uses: actions/cache@v5
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      # iOS artifacts are unsigned, so a --release build can't be installed on
      # a device without re-signing. Auto-downgrade release -> profile and
      # surface that loudly in logs and the artifact name.
      - name: Resolve effective build mode
        id: resolve_mode
        env:
          REQUESTED_MODE: ${{ github.event.inputs.build_mode }}
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
        run: |
          if [[ "$REQUESTED_MODE" == "release" ]]; then
            echo "::warning title=iOS release downgraded::Release iOS builds here are unsigned and cannot be installed on devices. Building profile instead."
            EFFECTIVE_MODE=profile
            ARTIFACT_SUFFIX=profile-downgraded-from-release
            DOWNGRADE_NOTE="Release was requested but iOS artifacts here are unsigned and can't be installed on a device. Built **profile** instead."
            DOWNGRADED=true
          else
            EFFECTIVE_MODE=$REQUESTED_MODE
            ARTIFACT_SUFFIX=$REQUESTED_MODE
            DOWNGRADE_NOTE=
            DOWNGRADED=false
          fi
          ARTIFACT_NAME="atelier-ios-${BUILD_VERSION}-${ARTIFACT_SUFFIX}"
          {
            echo "EFFECTIVE_MODE=$EFFECTIVE_MODE"
            echo "ARTIFACT_SUFFIX=$ARTIFACT_SUFFIX"
            echo "DOWNGRADE_NOTE=$DOWNGRADE_NOTE"
          } >> "$GITHUB_ENV"
          {
            echo "effective_mode=$EFFECTIVE_MODE"
            echo "artifact_name=$ARTIFACT_NAME"
            echo "downgraded=$DOWNGRADED"
          } >> "$GITHUB_OUTPUT"

      - name: Build iOS app (no codesign)
        run: flutter build ios "--${EFFECTIVE_MODE}" --no-codesign

      - name: Archive Runner.app
        env:
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
        run: |
          cd build/ios/iphoneos
          zip -r "../../../atelier-ios-${BUILD_VERSION}-${ARTIFACT_SUFFIX}.zip" Runner.app

      - name: Upload iOS artifact
        id: upload_ios
        uses: actions/upload-artifact@v5
        with:
          name: atelier-ios-${{ needs.setup.outputs.build_version }}-${{ env.ARTIFACT_SUFFIX }}
          path: atelier-ios-${{ needs.setup.outputs.build_version }}-${{ env.ARTIFACT_SUFFIX }}.zip
          retention-days: 14

      # See Android equivalent — print URL to stdout so it's tappable in the
      # mobile app's log view, then also append to the run summary for web.
      - name: Announce iOS artifact
        env:
          ARTIFACT_NAME: atelier-ios-${{ needs.setup.outputs.build_version }}-${{ env.ARTIFACT_SUFFIX }}
          ARTIFACT_URL: ${{ steps.upload_ios.outputs.artifact-url }}
          REQUESTED_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          echo "================================================================"
          echo "iOS (${EFFECTIVE_MODE}, requested ${REQUESTED_MODE}) artifact: ${ARTIFACT_NAME}.zip"
          if [[ -n "$DOWNGRADE_NOTE" ]]; then
            echo "NOTE: ${DOWNGRADE_NOTE}"
          fi
          echo "Download:"
          echo "${ARTIFACT_URL}"
          echo "================================================================"
          echo "::notice title=iOS artifact ready::${ARTIFACT_NAME} -> ${ARTIFACT_URL}"
          {
            echo "### iOS — \`${EFFECTIVE_MODE}\` (requested: \`${REQUESTED_MODE}\`)"
            echo ""
            if [[ -n "$DOWNGRADE_NOTE" ]]; then
              echo "> :warning: ${DOWNGRADE_NOTE}"
              echo ""
            fi
            echo "- Artifact: [\`${ARTIFACT_NAME}.zip\`](${ARTIFACT_URL})"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  # Mobile-friendly aggregator. Runs after both platform jobs (whether they
  # ran or were skipped) and reposts the artifact links in three places so
  # they're reachable however the user is browsing:
  #   1) the job's stdout (visible in the GitHub mobile app's log view)
  #   2) $GITHUB_STEP_SUMMARY (the markdown panel on the run page on web)
  #   3) a commit comment (surfaces in notifications and on the commit page)
  summarize:
    name: Summarize artifacts
    runs-on: ubuntu-latest
    needs: [setup, build-android, build-ios]
    if: always() && needs.setup.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Print artifact links to log and summary
        env:
          ANDROID_RESULT: ${{ needs.build-android.result }}
          ANDROID_NAME: ${{ needs.build-android.outputs.artifact_name }}
          ANDROID_URL: ${{ needs.build-android.outputs.artifact_url }}
          IOS_RESULT: ${{ needs.build-ios.result }}
          IOS_NAME: ${{ needs.build-ios.outputs.artifact_name }}
          IOS_URL: ${{ needs.build-ios.outputs.artifact_url }}
          IOS_EFFECTIVE_MODE: ${{ needs.build-ios.outputs.effective_mode }}
          IOS_DOWNGRADED: ${{ needs.build-ios.outputs.downgraded }}
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
        run: |
          echo "################################################################"
          echo "# Atelier ${BUILD_VERSION} — requested mode: ${BUILD_MODE}"
          echo "################################################################"

          {
            echo "## Atelier \`${BUILD_VERSION}\` — requested \`${BUILD_MODE}\`"
            echo ""
            echo "| Platform | Status | Artifact |"
            echo "| --- | --- | --- |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$ANDROID_RESULT" == "success" ]]; then
            echo "Android: ${ANDROID_NAME}.apk"
            echo "  ${ANDROID_URL}"
            echo "| Android | success | [\`${ANDROID_NAME}.apk\`](${ANDROID_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Android: ${ANDROID_RESULT}"
            echo "| Android | ${ANDROID_RESULT} | — |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "$IOS_RESULT" == "success" ]]; then
            echo "iOS (${IOS_EFFECTIVE_MODE}): ${IOS_NAME}.zip"
            echo "  ${IOS_URL}"
            ios_label="iOS"
            if [[ "$IOS_DOWNGRADED" == "true" ]]; then
              ios_label="iOS (downgraded to ${IOS_EFFECTIVE_MODE})"
            fi
            echo "| ${ios_label} | success | [\`${IOS_NAME}.zip\`](${IOS_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "iOS: ${IOS_RESULT}"
            echo "| iOS | ${IOS_RESULT} | — |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "################################################################"

      - name: Post artifact links as commit comment
        if: needs.build-android.result == 'success' || needs.build-ios.result == 'success'
        uses: actions/github-script@v7
        env:
          ANDROID_RESULT: ${{ needs.build-android.result }}
          ANDROID_NAME: ${{ needs.build-android.outputs.artifact_name }}
          ANDROID_URL: ${{ needs.build-android.outputs.artifact_url }}
          IOS_RESULT: ${{ needs.build-ios.result }}
          IOS_NAME: ${{ needs.build-ios.outputs.artifact_name }}
          IOS_URL: ${{ needs.build-ios.outputs.artifact_url }}
          IOS_EFFECTIVE_MODE: ${{ needs.build-ios.outputs.effective_mode }}
          IOS_DOWNGRADED: ${{ needs.build-ios.outputs.downgraded }}
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
          BUILD_VERSION: ${{ needs.setup.outputs.build_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const e = process.env;
            const lines = [
              `**Build \`${e.BUILD_VERSION}\`** — requested mode: \`${e.BUILD_MODE}\``,
              '',
            ];
            if (e.ANDROID_RESULT === 'success') {
              lines.push(`- Android: [\`${e.ANDROID_NAME}.apk\`](${e.ANDROID_URL})`);
            } else if (e.ANDROID_RESULT && e.ANDROID_RESULT !== 'skipped') {
              lines.push(`- Android: ${e.ANDROID_RESULT}`);
            }
            if (e.IOS_RESULT === 'success') {
              const note = e.IOS_DOWNGRADED === 'true'
                ? ` _(downgraded to ${e.IOS_EFFECTIVE_MODE})_`
                : '';
              lines.push(`- iOS${note}: [\`${e.IOS_NAME}.zip\`](${e.IOS_URL})`);
            } else if (e.IOS_RESULT && e.IOS_RESULT !== 'skipped') {
              lines.push(`- iOS: ${e.IOS_RESULT}`);
            }
            lines.push('', `[Run details](${e.RUN_URL})`);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: lines.join('\n'),
            });
